<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notes — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-deep:    #2d4fc4;
    --blue-mid:     #3a5bd9;
    --white:        #ffffff;
    --input-bg:     rgba(255,255,255,.18);
    --input-border: rgba(255,255,255,.4);
    --placeholder:  rgba(255,255,255,.6);
    --font: 'Open Sans', -apple-system, sans-serif;
    --radius: 8px;
    --ease: .18s cubic-bezier(.4,0,.2,1);
  }
  html, body { height: 100%; font-family: var(--font); background: var(--blue-mid); overflow: hidden; }

  /* ── Background blobs ── */
  .bg { position: fixed; inset: 0; background: var(--blue-mid); overflow: hidden; z-index: 0; }
  .bg::before {
    content: ""; position: absolute; top: -120px; right: -100px;
    width: 520px; height: 520px; border-radius: 50%;
    background: rgba(255,255,255,.07);
  }
  .bg::after {
    content: ""; position: absolute; bottom: -80px; left: -120px;
    width: 480px; height: 420px; border-radius: 50%;
    background: rgba(255,255,255,.06);
  }
  .blob-mid {
    position: absolute; top: 35%; left: -60px;
    width: 300px; height: 340px;
    border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
    background: rgba(255,255,255,.05);
  }
  .blob-right {
    position: absolute; bottom: 10%; right: -40px;
    width: 260px; height: 280px;
    border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%;
    background: rgba(255,255,255,.05);
  }

  /* ── Card ── */
  .card-wrap {
    position: relative; z-index: 1; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; }

  /* ── Logo ── */
  .logo { margin-bottom: 28px; color: var(--white); opacity: .92; }
  .logo svg { display: block; }

  /* ── Tabs ── */
  .tabs {
    display: flex; width: 100%; margin-bottom: 22px;
    border-bottom: 1.5px solid rgba(255,255,255,.25);
  }
  .tab-btn {
    flex: 1; background: transparent; border: none;
    padding: 9px 4px 10px; color: rgba(255,255,255,.55);
    font-family: var(--font); font-size: 12.5px; font-weight: 700;
    letter-spacing: .03em; cursor: pointer; position: relative;
    transition: color var(--ease); white-space: nowrap;
  }
  .tab-btn::after {
    content: ""; position: absolute; bottom: -1.5px; left: 0; right: 0;
    height: 2.5px; background: var(--white); border-radius: 2px 2px 0 0;
    opacity: 0; transition: opacity var(--ease);
  }
  .tab-btn.active { color: var(--white); }
  .tab-btn.active::after { opacity: 1; }

  /* ── Panels ── */
  .panel { display: none; flex-direction: column; gap: 12px; width: 100%; }
  .panel.active { display: flex; animation: panelIn .2s ease; }
  @keyframes panelIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Input group ── */
  .input-group { position: relative; width: 100%; }
  .input-group .icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,.65); pointer-events: none;
    display: flex; align-items: center;
  }
  .input-group input {
    width: 100%; background: var(--input-bg); border: 1.5px solid var(--input-border);
    border-radius: var(--radius); padding: 11px 38px 11px 40px;
    color: var(--white); font-family: var(--font); font-size: 13px;
    letter-spacing: .04em; outline: none;
    transition: border-color var(--ease), background var(--ease); -webkit-appearance: none;
  }
  .input-group input::placeholder { color: var(--placeholder); letter-spacing: .06em; font-size: 12px; }
  .input-group input:focus { border-color: rgba(255,255,255,.75); background: rgba(255,255,255,.22); }
  .input-group input.error-field { border-color: #ff9999; }

  .eye-btn {
    position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
    background: transparent; border: none; color: rgba(255,255,255,.55);
    cursor: pointer; display: flex; align-items: center; padding: 0;
    transition: color var(--ease);
  }
  .eye-btn:hover { color: var(--white); }

  /* ── Strength bar ── */
  .strength-wrap { display: flex; flex-direction: column; gap: 3px; }
  .strength-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,.2); overflow: hidden; }
  .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width .22s, background .22s; }
  .strength-label { font-size: 11px; color: rgba(255,255,255,.55); font-weight: 600; min-height: 14px; }

  /* ── Divider / section label ── */
  .form-divider { height: 1px; background: rgba(255,255,255,.18); margin: 2px 0; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.5); }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%; padding: 12px; background: var(--white); color: var(--blue-deep);
    border: none; border-radius: var(--radius); font-family: var(--font);
    font-size: 13.5px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; transition: background var(--ease), transform .12s, box-shadow .12s;
    box-shadow: 0 4px 18px rgba(0,0,0,.18); margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:hover:not(:disabled) { background: #eef2ff; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(0,0,0,.22); }
  .btn-primary:active:not(:disabled) { transform: translateY(0); }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .btn-spinner {
    width: 14px; height: 14px; border: 2px solid rgba(61,95,212,.3);
    border-top-color: var(--blue-deep); border-radius: 50%;
    animation: spin .7s linear infinite; display: none;
  }
  .btn-primary.loading .btn-spinner { display: block; }
  .btn-primary.loading .btn-text { opacity: .7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .link-row { text-align: center; margin-top: 2px; }
  .link-btn {
    background: transparent; border: none; color: rgba(255,255,255,.7);
    font-family: var(--font); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: color var(--ease); padding: 0;
  }
  .link-btn:hover { color: var(--white); }

  /* ── Inline message ── */
  .msg {
    font-size: 12.5px; text-align: center; font-weight: 600; min-height: 17px;
    letter-spacing: .01em; border-radius: 6px; padding: 0;
    transition: all .18s;
  }
  .msg.error   { color: #ffb3b3; }
  .msg.success { color: #b3ffd0; }

  @media (max-width: 420px) { .card { max-width: 100%; } .tab-btn { font-size: 11.5px; } }
</style>
</head>
<body>

<div class="bg"><div class="blob-mid"></div><div class="blob-right"></div></div>

<div class="card-wrap">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <svg width="62" height="62" viewBox="0 0 64 64" fill="none">
        <path d="M16 20H52L47 42H21L16 20Z" stroke="white" stroke-width="2.8" stroke-linejoin="round"/>
        <path d="M32 36V28M29 31l3-3 3 3" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 14H17L21 32" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="24" cy="47" r="2.5" fill="white"/>
        <circle cx="44" cy="47" r="2.5" fill="white"/>
      </svg>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn"        data-tab="signup">Sign Up</button>
      <button class="tab-btn"        data-tab="change">Change Password</button>
    </div>

    <!-- ── LOGIN ── -->
    <div class="panel active" id="panel-login">
      <div class="input-group">
        <span class="icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
        <input type="email" id="login-email" placeholder="EMAIL" autocomplete="email">
      </div>
      <div class="input-group">
        <span class="icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
        <input type="password" id="login-password" placeholder="PASSWORD" autocomplete="current-password">
        <button class="eye-btn" type="button" tabindex="-1" onclick="togglePwd('login-password',this)" aria-label="Show password">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="msg" id="login-msg"></p>
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
        <span class="btn-spinner"></span><span class="btn-text">LOGIN</span>
      </button>
      <div class="link-row"><button class="link-btn" onclick="switchTab('change')">Forgot password?</button></div>
    </div>

    <!-- ── SIGN UP ── -->
    <div class="panel" id="panel-signup">
      <div class="input-group">
        <span class="icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
        <input type="email" id="signup-email" placeholder="EMAIL" autocomplete="email">
      </div>
      <div class="input-group">
        <span class="icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
        <input type="password" id="signup-password" placeholder="PASSWORD" autocomplete="new-password" oninput="updateStrength(this.value)">
        <button class="eye-btn" type="button" tabindex="-1" onclick="togglePwd('signup-password',this)" aria-label="Show password">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-wrap">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="input-group">
        <span class="icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
        <input type="password" id="signup-repeat" placeholder="REPEAT PASSWORD" autocomplete="new-password">
        <button class="eye-btn" type="button" tabindex="-1" onclick="togglePwd('signup-repeat',this)" aria-label="Show password">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="msg" id="signup-msg"></p>
      <button class="btn-primary" id="signupBtn" onclick="handleSignup()">
        <span class="btn-spinner"></span><span class="btn-text">CREATE ACCOUNT</span>
      </button>
    </div>

    <!-- ── CHANGE PASSWORD ── -->
    <div class="panel" id="panel-change">
      <div class="input-group">
        <span class="icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
        <input type="email" id="change-email" placeholder="YOUR EMAIL" autocomplete="email">
      </div>
      <div class="form-divider"></div>
      <div class="section-label">New Password</div>
      <div class="input-group">
        <span class="icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
        <input type="password" id="change-new" placeholder="NEW PASSWORD" autocomplete="new-password">
        <button class="eye-btn" type="button" tabindex="-1" onclick="togglePwd('change-new',this)" aria-label="Show password">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="input-group">
        <span class="icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>
        <input type="password" id="change-confirm" placeholder="CONFIRM NEW PASSWORD" autocomplete="new-password">
        <button class="eye-btn" type="button" tabindex="-1" onclick="togglePwd('change-confirm',this)" aria-label="Show password">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="msg" id="change-msg"></p>
      <button class="btn-primary" id="changeBtn" onclick="handleChangePassword()">
        <span class="btn-spinner"></span><span class="btn-text">UPDATE PASSWORD</span>
      </button>
      <div class="link-row"><button class="link-btn" onclick="switchTab('login')">← Back to Login</button></div>
    </div>

  </div>
</div>

<script>
  /* ── Tab switching ── */
  function switchTab(name) {
    document.querySelectorAll(".tab-btn").forEach((b) =>
      b.classList.toggle("active", b.dataset.tab === name));
    document.querySelectorAll(".panel").forEach((p) =>
      p.classList.toggle("active", p.id === "panel-" + name));
    clearMessages();
  }
  document.querySelectorAll(".tab-btn").forEach((btn) =>
    btn.addEventListener("click", () => switchTab(btn.dataset.tab)));

  /* ── Eye toggle ── */
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const showing = inp.type === "text";
    inp.type = showing ? "password" : "text";
    btn.style.opacity = showing ? "1" : ".5";
  }

  /* ── Password strength ── */
  const STRENGTH_LABELS = ["", "Weak", "Fair", "Good", "Strong"];
  const STRENGTH_COLORS = ["", "#ff6b6b", "#ffa94d", "#69db7c", "#2f9e44"];
  function updateStrength(val) {
    let score = 0;
    if (val.length >= 8)            score++;
    if (/[A-Z]/.test(val))          score++;
    if (/[0-9]/.test(val))          score++;
    if (/[^A-Za-z0-9]/.test(val))   score++;
    const fill  = document.getElementById("strengthFill");
    const label = document.getElementById("strengthLabel");
    fill.style.width      = (score / 4 * 100) + "%";
    fill.style.background = val ? STRENGTH_COLORS[score] : "";
    label.textContent     = val ? STRENGTH_LABELS[score] : "";
    label.style.color     = val ? STRENGTH_COLORS[score] : "";
  }

  /* ── Message helpers ── */
  function setMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className   = "msg " + (type || "");
  }
  function clearMessages() {
    document.querySelectorAll(".msg").forEach((m) => { m.textContent = ""; m.className = "msg"; });
    document.querySelectorAll("input").forEach((i) => i.classList.remove("error-field"));
  }

  /* ── Loading state ── */
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.classList.toggle("loading", loading);
  }

  /* ── Validation ── */
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  function validateEmail(val, fieldId, msgId) {
    if (!val || !EMAIL_RE.test(val)) {
      setMsg(msgId, "Please enter a valid email address.", "error");
      document.getElementById(fieldId).classList.add("error-field");
      return false;
    }
    return true;
  }
  function validatePassword(val, fieldId, msgId, label) {
    if (val.length < 8) {
      setMsg(msgId, (label || "Password") + " must be at least 8 characters.", "error");
      document.getElementById(fieldId).classList.add("error-field");
      return false;
    }
    return true;
  }

  /* ── API call helper ── */
  async function apiPost(url, body) {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    return { status: res.status, data: await res.json() };
  }

  /* ── LOGIN ── */
  async function handleLogin() {
    clearMessages();
    const email = document.getElementById("login-email").value.trim();
    const pwd   = document.getElementById("login-password").value;
    if (!validateEmail(email, "login-email", "login-msg")) return;
    if (!pwd) { setMsg("login-msg", "Password is required.", "error"); document.getElementById("login-password").classList.add("error-field"); return; }

    setLoading("loginBtn", true);
    try {
      const { status, data } = await apiPost("/api/auth/login", { email, password: pwd });
      if (status === 200) {
        setMsg("login-msg", "Welcome back! Redirecting…", "success");
        setTimeout(() => window.location.href = "/notes", 600);
      } else {
        setMsg("login-msg", data.error || "Login failed.", "error");
      }
    } catch (_) {
      setMsg("login-msg", "Network error. Please try again.", "error");
    } finally {
      setLoading("loginBtn", false);
    }
  }

  /* ── SIGN UP ── */
  async function handleSignup() {
    clearMessages();
    const email  = document.getElementById("signup-email").value.trim();
    const pwd    = document.getElementById("signup-password").value;
    const repeat = document.getElementById("signup-repeat").value;
    if (!validateEmail(email, "signup-email", "signup-msg"))         return;
    if (!validatePassword(pwd, "signup-password", "signup-msg"))     return;
    if (pwd !== repeat) {
      setMsg("signup-msg", "Passwords do not match.", "error");
      document.getElementById("signup-repeat").classList.add("error-field");
      return;
    }

    setLoading("signupBtn", true);
    try {
      const { status, data } = await apiPost("/api/auth/signup", { email, password: pwd });
      if (status === 201) {
        setMsg("signup-msg", "Account created! Taking you in…", "success");
        setTimeout(() => window.location.href = "/notes", 700);
      } else {
        setMsg("signup-msg", data.error || "Sign-up failed.", "error");
      }
    } catch (_) {
      setMsg("signup-msg", "Network error. Please try again.", "error");
    } finally {
      setLoading("signupBtn", false);
    }
  }

  /* ── CHANGE PASSWORD ── */
  async function handleChangePassword() {
    clearMessages();
    const email   = document.getElementById("change-email").value.trim();
    const newPwd  = document.getElementById("change-new").value;
    const confirm = document.getElementById("change-confirm").value;
    if (!validateEmail(email, "change-email", "change-msg"))              return;
    if (!validatePassword(newPwd, "change-new", "change-msg", "New password")) return;
    if (newPwd !== confirm) {
      setMsg("change-msg", "Passwords do not match.", "error");
      document.getElementById("change-confirm").classList.add("error-field");
      return;
    }

    setLoading("changeBtn", true);
    try {
      const { status, data } = await apiPost("/api/auth/change-password",
        { email, new_password: newPwd });
      if (data.ok) {
        setMsg("change-msg", data.message || "Password updated.", "success");
      } else {
        setMsg("change-msg", data.error || "Something went wrong.", "error");
      }
    } catch (_) {
      setMsg("change-msg", "Network error. Please try again.", "error");
    } finally {
      setLoading("changeBtn", false);
    }
  }

  /* ── Enter key ── */
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter" || e.target.tagName === "BUTTON") return;
    const panel = document.querySelector(".panel.active");
    if (!panel) return;
    if (panel.id === "panel-login")  handleLogin();
    if (panel.id === "panel-signup") handleSignup();
    if (panel.id === "panel-change") handleChangePassword();
  });
</script>
</body>
</html>
