<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div id="app" class="view-list">

  <!-- ================= SIDEBAR (Folders) ================= -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Folders</span>
      <div class="sidebar-header-actions">
        <button class="icon-btn" id="newFolderBtn" title="New Folder">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn collapse-btn" id="collapseSidebar" title="Collapse Folders">
          <svg viewBox="0 0 24 24" width="15" height="15"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
    <nav class="folder-list" id="folderList"><!-- injected --></nav>
  </aside>

  <!-- Sidebar collapsed tab -->
  <div class="panel-tab sidebar-tab hidden" id="sidebarTab" title="Show Folders">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M3 6.5A1.5 1.5 0 0 1 4.5 5h4.4a1.5 1.5 0 0 1 1.2.6l1.2 1.6a1.5 1.5 0 0 0 1.2.6h7a1.5 1.5 0 0 1 1.5 1.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 18.3v-11.8z" fill="currentColor"/></svg>
    <span>Folders</span>
  </div>

  <!-- ================= NOTE LIST ================= -->
  <section class="note-list-pane" id="noteListPane">
    <div class="note-list-header">
      <button class="icon-btn back-btn" id="backToFolders" title="Folders">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h1 id="currentFolderTitle">All Notes</h1>
      <button class="icon-btn collapse-btn" id="collapseNoteList" title="Collapse Note List">
        <svg viewBox="0 0 24 24" width="15" height="15"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Search & Filter bar -->
    <div class="search-filter-bar">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchInput" type="text" placeholder="Search notes…">
        <button class="clear-search hidden" id="clearSearch" title="Clear">&times;</button>
      </div>
      <div class="filter-row">
        <button class="filter-chip active" data-filter="all" id="filterAll">All</button>
        <button class="filter-chip" data-filter="pinned" id="filterPinned">
          <svg viewBox="0 0 24 24" width="10" height="10"><path d="M14 2l8 8-4 1-5 5-1 4-2-2 3-3-5-5-3 3-2-2 4-1 5-5 1-4z" fill="currentColor"/></svg>
          Pinned
        </button>
        <button class="filter-chip" data-filter="today" id="filterToday">Today</button>
        <button class="filter-chip" data-filter="week" id="filterWeek">This Week</button>
      </div>
    </div>

    <div class="note-list-toolbar">
      <div class="view-toggle" id="viewToggle" role="tablist" aria-label="View mode">
        <button class="view-toggle-btn active" id="viewListBtn" data-view="list" title="List view" aria-label="List view">
          <svg viewBox="0 0 24 24" width="15" height="15"><path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="view-toggle-btn" id="viewStickyBtn" data-view="sticky" title="Sticky notes view" aria-label="Sticky notes view">
          <svg viewBox="0 0 24 24" width="15" height="15"><rect x="3" y="3" width="8" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="13" width="8" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="8" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
      </div>
      <div class="sort-wrapper">
        <button class="sort-btn" id="sortBtn">
          <span id="sortLabel">Date Edited</span>
          <svg viewBox="0 0 24 24" width="11" height="11"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="sort-menu hidden" id="sortMenu">
          <div class="sort-option" data-sort="updated">Date Edited</div>
          <div class="sort-option" data-sort="created">Date Created</div>
          <div class="sort-option" data-sort="title">Title</div>
        </div>
      </div>
      <button class="icon-btn danger-text" id="emptyTrashBtn" title="Empty Trash" style="display:none">Empty</button>
    </div>

    <div class="trash-banner hidden" id="trashBanner">Notes are permanently deleted after 30 days in Recently Deleted.</div>

    <ul class="note-list" id="noteList"><!-- injected --></ul>
    <div class="sticky-grid hidden" id="stickyGrid"><!-- injected --></div>
    <div class="empty-state hidden" id="noteListEmpty">
      <svg viewBox="0 0 24 24" width="40" height="40"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <p>No Notes Found</p>
    </div>
  </section>

  <!-- Note list collapsed tab -->
  <div class="panel-tab notelist-tab hidden" id="noteListTab" title="Show Notes">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 3h9l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>Notes</span>
  </div>

  <!-- ================= EDITOR ================= -->
  <section class="editor-pane" id="editorPane">

    <!-- Editor Taskbar -->
    <div class="editor-taskbar" id="editorTaskbar">
      <div class="taskbar-left">
        <button class="icon-btn back-btn editor-back" id="backToList" title="Notes">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="taskbar-btn" id="taskbarNewNote" title="New Note">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          <span>New Note</span>
        </button>
        <button class="taskbar-btn" id="taskbarPinBtn" title="Pin Note">
          <svg viewBox="0 0 24 24" width="15" height="15"><path d="M14 2l8 8-4 1-5 5-1 4-2-2 3-3-5-5-3 3-2-2 4-1 5-5 1-4z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span id="taskbarPinLabel">Pin</span>
        </button>
        <button class="taskbar-btn" id="taskbarMoveBtn" title="Move to Folder">
          <svg viewBox="0 0 24 24" width="15" height="15"><path d="M3 7a1 1 0 0 1 1-1h4l2 2h10a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span>Move</span>
        </button>
        <button class="taskbar-btn danger-btn" id="taskbarDeleteBtn" title="Delete Note">
          <svg viewBox="0 0 24 24" width="15" height="15"><path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Delete</span>
        </button>
      </div>
      <div class="taskbar-right">
        <div class="taskbar-status">
          <span id="saveStatus"></span>
          <span id="wordCount"></span>
        </div>
        <button class="taskbar-icon-btn" id="exportBtn" title="Export notes as CSV">
          <svg viewBox="0 0 24 24" width="17" height="17"><path d="M12 16l-4-4h2.5V4h3v8H16l-4 4z" fill="currentColor"/><path d="M4 18h16v2H4z" fill="currentColor"/></svg>
        </button>
        <button class="taskbar-icon-btn" id="settingsBtn" title="Settings">
          <svg viewBox="0 0 24 24" width="17" height="17"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
      </div>
    </div>

    <div class="editor-empty" id="editorEmpty">
      <svg viewBox="0 0 24 24" width="56" height="56"><path d="M6 4h9l4 4v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M14 4v4h4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 11h8M8 14h8M8 17h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <p>No Note Selected</p>
      <button class="create-first-btn" id="createFirstNote">
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        New Note
      </button>
    </div>

    <div class="editor-content hidden" id="editorContent">

      <div class="trashed-banner hidden" id="trashedBanner">
        This note is in Recently Deleted.
        <button id="recoverBtn">Recover Note</button>
      </div>

      <!-- Separate title box -->
      <div class="note-title-box" id="noteTitleBox">
        <input type="text" id="noteTitleInput" placeholder="Note title…" autocomplete="off" spellcheck="true">
      </div>

      <div id="quillToolbar">
        <span class="ql-formats">
          <select class="ql-header">
            <option value="2">Heading</option>
            <option value="3">Subheading</option>
            <option selected value="false">Body</option>
          </select>
        </span>
        <span class="ql-formats">
          <button class="ql-bold"></button>
          <button class="ql-italic"></button>
          <button class="ql-underline"></button>
          <button class="ql-strike"></button>
        </span>
        <span class="ql-formats">
          <button class="ql-list" value="bullet"></button>
          <button class="ql-list" value="ordered"></button>
          <button class="ql-list" value="unchecked" id="checklistBtn"></button>
          <button class="ql-indent" value="-1"></button>
          <button class="ql-indent" value="+1"></button>
        </span>
        <span class="ql-formats">
          <select class="ql-align"></select>
          <button class="ql-blockquote"></button>
          <button class="ql-code-block"></button>
        </span>
        <span class="ql-formats">
          <select class="ql-color"></select>
          <select class="ql-background"></select>
        </span>
        <span class="ql-formats">
          <button class="ql-link"></button>
          <button class="ql-image"></button>
        </span>
        <span class="ql-formats">
          <button class="ql-clean"></button>
        </span>
      </div>

      <div id="quillEditor"></div>
    </div>
  </section>
</div>

<!-- ===== Settings Panel ===== -->
<div class="settings-panel hidden" id="settingsPanel">
  <div class="settings-header">
    <h2>Settings</h2>
    <button class="icon-btn" id="closeSettings">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 6l12 12M6 18L18 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
    </button>
  </div>
  <!-- Signed-in user -->
  <div class="settings-section">
    <div class="settings-label">Signed in as</div>
    <div class="settings-user-row">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span id="settingsUserEmail" class="settings-user-email">—</span>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Font Size</div>
    <div class="settings-row">
      <span class="settings-hint">Small</span>
      <input type="range" id="fontSizeSlider" min="13" max="19" value="15" step="1">
      <span class="settings-hint">Large</span>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Line Spacing</div>
    <div class="settings-row">
      <span class="settings-hint">Tight</span>
      <input type="range" id="lineSpacingSlider" min="1.3" max="2.1" value="1.5" step="0.1">
      <span class="settings-hint">Loose</span>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Editor Width</div>
    <div class="settings-chips">
      <button class="settings-chip active" data-width="760">Normal</button>
      <button class="settings-chip" data-width="600">Narrow</button>
      <button class="settings-chip" data-width="1100">Wide</button>
    </div>
  </div>
  <div class="settings-divider"></div>
  <div class="settings-section">
    <button class="settings-logout-btn" id="logoutBtn">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign Out
    </button>
  </div>
</div>

<!-- ===== Floating menus / dialogs ===== -->
<div class="context-menu hidden" id="contextMenu"></div>
<div class="overlay hidden" id="overlay"></div>
<div class="confirm-dialog hidden" id="confirmDialog">
  <p id="confirmMessage"></p>
  <div class="confirm-actions">
    <button id="confirmCancel">Cancel</button>
    <button id="confirmOk" class="danger">Delete</button>
  </div>
</div>

<!-- Drag ghost label -->
<div id="dragGhost"></div>
<!-- Export toast -->
<div id="exportToast"></div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
