<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ note.title }} — Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--forest:#3a6b32;--cream:#f5f0e4;--text:#1e1b14;--muted:#7a7260;--divider:#d4ccbc;--font-h:'Instrument Serif',Georgia,serif;--font:'Work Sans',sans-serif}
html,body{min-height:100%;background:var(--cream);font-family:var(--font);color:var(--text)}
.header{background:var(--forest);color:#fff;padding:14px 28px;display:flex;align-items:center;gap:12px}
.header-logo{font-family:var(--font-h);font-style:italic;font-size:20px}
.header-badge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px}
.header-title{font-size:13.5px;opacity:.8;margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:320px}
.container{max-width:760px;margin:40px auto;padding:0 24px 60px}
h1.note-title{font-family:var(--font-h);font-size:32px;font-style:italic;font-weight:400;color:var(--text);margin-bottom:8px;line-height:1.2}
.meta{font-size:12.5px;color:var(--muted);margin-bottom:18px;display:flex;gap:16px;flex-wrap:wrap}
.tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tag-chip{background:rgba(58,107,50,.12);color:var(--forest);border-radius:100px;padding:3px 10px;font-size:12px;font-weight:600}
.divider{height:1px;background:var(--divider);margin-bottom:28px}
.note-body{font-size:15px;line-height:1.7;color:var(--text)}
.note-body h2{font-family:var(--font-h);font-size:1.7em;font-weight:400;color:#2a4e24;margin:24px 0 8px}
.note-body h3{font-family:var(--font-h);font-size:1.3em;font-style:italic;font-weight:400;color:var(--forest);margin:20px 0 6px}
.note-body p{margin-bottom:12px}
.note-body ul,.note-body ol{padding-left:22px;margin-bottom:12px}
.note-body li{margin-bottom:4px}
.note-body blockquote{border-left:3px solid var(--forest);padding-left:14px;margin:16px 0;color:var(--muted);font-style:italic}
.note-body pre{background:#f0ece0;border-radius:6px;padding:12px 16px;overflow-x:auto;font-size:13px}
.footer{text-align:center;margin-top:48px;font-size:12px;color:var(--muted)}
.footer a{color:var(--forest);text-decoration:none}
</style>
</head>
<body>
<div class="header">
  <span class="header-logo">Notes</span>
  <span class="header-badge">Shared Note</span>
  <span class="header-title">{{ note.title }}</span>
</div>
<div class="container">
  <h1 class="note-title">{{ note.title }}</h1>
  <div class="meta">
    <span>Created {{ note.created_at.strftime('%B %d, %Y') }}</span>
    <span>Updated {{ note.updated_at.strftime('%B %d, %Y') }}</span>
  </div>
  {% if note.tags %}
  <div class="tags-row">
    {% for tag in note.tags %}<span class="tag-chip">#{{ tag.name }}</span>{% endfor %}
  </div>
  {% endif %}
  <div class="divider"></div>
  <div class="note-body">{{ note.content|safe }}</div>
  <div class="footer">Shared via <a href="/">Notes</a></div>
</div>
</body>
</html>
